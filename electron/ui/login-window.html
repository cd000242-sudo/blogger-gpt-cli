<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://cdn.jsdelivr.net https://fonts.gstatic.com data:; connect-src 'self' https:; img-src 'self' data: blob: https:;">
  <title>LEADERNAM Orbit - 인증</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #ec4899;
      --accent: #06b6d4;
      --dark: #0f172a;
      --darker: #020617;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--darker);
      min-height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
    }
    
    /* 애니메이션 배경 */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }
    
    .bg-gradient {
      position: absolute;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse 80% 50% at 20% 40%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 80% 60%, rgba(236, 72, 153, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse 50% 30% at 50% 80%, rgba(6, 182, 212, 0.1) 0%, transparent 50%);
      animation: gradientShift 15s ease-in-out infinite;
    }
    
    @keyframes gradientShift {
      0%, 100% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.1) rotate(3deg); }
    }
    
    /* 플로팅 오브 */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      animation: float 20s ease-in-out infinite;
    }
    
    .orb-1 {
      width: 400px;
      height: 400px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      top: -100px;
      right: -100px;
      opacity: 0.3;
      animation-delay: 0s;
    }
    
    .orb-2 {
      width: 300px;
      height: 300px;
      background: linear-gradient(135deg, var(--accent), var(--primary));
      bottom: -50px;
      left: -50px;
      opacity: 0.25;
      animation-delay: -5s;
    }
    
    .orb-3 {
      width: 200px;
      height: 200px;
      background: linear-gradient(135deg, var(--secondary), var(--accent));
      top: 50%;
      left: 50%;
      opacity: 0.2;
      animation-delay: -10s;
    }
    
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -30px) scale(1.05); }
      50% { transform: translate(-20px, 20px) scale(0.95); }
      75% { transform: translate(20px, 10px) scale(1.02); }
    }
    
    /* 그리드 패턴 */
    .grid-pattern {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 20s linear infinite;
    }
    
    @keyframes gridMove {
      0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
      100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
    }
    
    /* 메인 컨테이너 */
    .main-container {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 30px 20px;
    }
    
    /* 로그인 카드 */
    .login-card {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 36px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 
        0 0 0 1px rgba(255, 255, 255, 0.05) inset,
        0 25px 50px -12px rgba(0, 0, 0, 0.5),
        0 0 100px rgba(99, 102, 241, 0.1);
      animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }
    
    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    }
    
    @keyframes cardAppear {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    /* 로고 섹션 */
    .logo-section {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .logo-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      box-shadow: 
        0 10px 40px rgba(99, 102, 241, 0.4),
        0 0 0 1px rgba(255,255,255,0.1) inset;
      animation: logoFloat 3s ease-in-out infinite;
      position: relative;
    }
    
    .logo-icon::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 26px;
      background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
      z-index: -1;
      filter: blur(15px);
      opacity: 0.5;
      animation: glowPulse 2s ease-in-out infinite;
    }
    
    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    
    @keyframes glowPulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }
    
    .logo-title {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    
    .logo-subtitle {
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    
    /* 폼 그룹 */
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-label {
      display: block;
      color: rgba(255, 255, 255, 0.7);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }
    
    .input-wrapper {
      position: relative;
    }
    
    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      opacity: 0.5;
      transition: all 0.3s ease;
    }
    
    .form-input {
      width: 100%;
      padding: 16px 16px 16px 48px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      transition: all 0.3s ease;
      outline: none;
    }
    
    .form-input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }
    
    .form-input:hover {
      border-color: rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.05);
    }
    
    .form-input:focus {
      border-color: var(--primary);
      background: rgba(99, 102, 241, 0.05);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    }
    
    .form-input:focus + .input-icon,
    .form-input:not(:placeholder-shown) + .input-icon {
      opacity: 1;
      color: var(--primary);
    }
    
    /* 코드 힌트 */
    .code-hint {
      margin-top: 10px;
      padding: 12px 14px;
      background: rgba(6, 182, 212, 0.05);
      border: 1px solid rgba(6, 182, 212, 0.1);
      border-radius: 10px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      line-height: 1.6;
    }
    
    .code-hint span {
      color: var(--accent);
    }
    
    /* 체크박스 */
    .checkbox-group {
      display: flex;
      align-items: center;
      margin-bottom: 28px;
      cursor: pointer;
    }
    
    .checkbox-input {
      display: none;
    }
    
    .checkbox-custom {
      width: 22px;
      height: 22px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      margin-right: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }
    
    .checkbox-custom::after {
      content: '✓';
      color: white;
      font-size: 12px;
      font-weight: 700;
      opacity: 0;
      transform: scale(0);
      transition: all 0.2s ease;
    }
    
    .checkbox-input:checked + .checkbox-custom {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-color: transparent;
    }
    
    .checkbox-input:checked + .checkbox-custom::after {
      opacity: 1;
      transform: scale(1);
    }
    
    .checkbox-label {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      user-select: none;
    }
    
    /* 로그인 버튼 */
    .login-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: 14px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.5px;
    }
    
    .login-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }
    
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 
        0 10px 40px rgba(99, 102, 241, 0.4),
        0 0 0 1px rgba(255,255,255,0.1) inset;
    }
    
    .login-btn:hover::before {
      left: 100%;
    }
    
    .login-btn:active {
      transform: translateY(0);
    }
    
    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .login-btn .btn-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    /* 로딩 스피너 */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* 메시지 */
    .message {
      padding: 14px 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
      animation: messageAppear 0.4s ease;
    }
    
    .message.show {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .message-icon {
      font-size: 18px;
      flex-shrink: 0;
    }
    
    .message.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
    }
    
    .message.success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.2);
      color: #86efac;
    }
    
    @keyframes messageAppear {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* 푸터 */
    .footer-info {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      text-align: center;
    }
    
    .footer-text {
      color: rgba(255, 255, 255, 0.3);
      font-size: 12px;
      line-height: 1.8;
    }
    
    .footer-text .highlight {
      color: rgba(255, 255, 255, 0.5);
    }
    
    /* 환영 모달 */
    .welcome-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(20px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .welcome-modal.show {
      display: flex;
      animation: modalFadeIn 0.4s ease;
    }
    
    @keyframes modalFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .welcome-content {
      background: var(--glass);
      backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      padding: 60px;
      text-align: center;
      max-width: 450px;
      animation: welcomeAppear 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    @keyframes welcomeAppear {
      from { 
        opacity: 0; 
        transform: scale(0.9) translateY(20px); 
      }
      to { 
        opacity: 1; 
        transform: scale(1) translateY(0); 
      }
    }
    
    .welcome-icon {
      font-size: 72px;
      margin-bottom: 24px;
      animation: welcomeBounce 1s ease infinite;
    }
    
    @keyframes welcomeBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    .welcome-title {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, rgba(255,255,255,0.8));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }
    
    .welcome-message {
      color: rgba(255, 255, 255, 0.6);
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    
    .welcome-loader {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(99, 102, 241, 0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    
    .welcome-checkmark {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 50%;
      margin: 0 auto;
      display: none;
      align-items: center;
      justify-content: center;
      animation: checkmarkPop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
    
    .welcome-checkmark::after {
      content: '✓';
      color: white;
      font-size: 32px;
      font-weight: 700;
    }
    
    @keyframes checkmarkPop {
      0% { transform: scale(0); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    
    /* 파티클 효과 */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--primary);
      border-radius: 50%;
      opacity: 0;
    }
    
    /* 반응형 */
    @media (max-width: 480px) {
      .login-card {
        padding: 32px 24px;
        border-radius: 24px;
      }
      
      .logo-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <!-- 배경 애니메이션 -->
  <div class="bg-animation">
    <div class="bg-gradient"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-pattern"></div>
  </div>
  
  <div class="particles" id="particles"></div>
  
  <!-- 메인 컨테이너 -->
  <div class="main-container">
    <div class="login-card">
      <!-- 로고 섹션 -->
      <div class="logo-section">
        <div class="logo-icon">🚀</div>
        <h1 class="logo-title">LEADERNAM Orbit</h1>
        <p class="logo-subtitle">Premium License</p>
      </div>

      <!-- 무료 체험 버튼 -->
      <button id="freeTrialBtn" onclick="startFreeTrial()" style="
        width: 100%; padding: 14px; margin-bottom: 24px;
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        border: none; border-radius: 14px; color: white;
        font-size: 16px; font-weight: 700; cursor: pointer;
        box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
        transition: all 0.3s ease; display: flex;
        align-items: center; justify-content: center; gap: 8px;
      " onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 12px 32px rgba(16,185,129,0.4)'"
         onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 8px 24px rgba(16,185,129,0.3)'">
        🆓 매일 2회 무료체험하기
      </button>

      <div style="text-align: center; margin-bottom: 20px; position: relative;">
        <div style="border-top: 1px solid rgba(255,255,255,0.1); position: absolute; top: 50%; left: 0; right: 0;"></div>
        <span style="background: rgba(2,6,23,0.8); padding: 0 12px; color: rgba(255,255,255,0.3); font-size: 12px; position: relative;">또는 라이선스 로그인</span>
      </div>

      <!-- 메시지 영역 -->
      <div id="errorMessage" class="message error">
        <span class="message-icon">⚠️</span>
        <span class="message-text"></span>
      </div>
      <div id="successMessage" class="message success">
        <span class="message-icon">✅</span>
        <span class="message-text"></span>
      </div>
      
      <!-- 로그인 폼 -->
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">아이디</label>
          <div class="input-wrapper">
            <input 
              type="text" 
              class="form-input" 
              id="userId" 
              placeholder="아이디를 입력하세요"
              required
              autocomplete="username"
            >
            <span class="input-icon">👤</span>
          </div>
        </div>
        
        <div class="form-group">
          <label class="form-label">비밀번호</label>
          <div class="input-wrapper">
            <input 
              type="password" 
              class="form-input" 
              id="password" 
              placeholder="비밀번호를 입력하세요"
              required
              autocomplete="current-password"
            >
            <span class="input-icon">🔒</span>
          </div>
        </div>
        
        <div class="form-group" id="licenseCodeGroup">
          <label class="form-label">라이선스 코드 <span style="opacity: 0.5; font-weight: 400;">(최초 등록 시에만)</span></label>
          <div class="input-wrapper">
            <input 
              type="text" 
              class="form-input" 
              id="licenseCode" 
              placeholder="XXXX-XXXX-XXXX-XXXX"
              autocomplete="off"
            >
            <span class="input-icon">🔑</span>
          </div>
          <div class="code-hint">
            <span>•</span> <strong>최초 등록</strong>: 아이디 + 비밀번호 + 라이선스 코드 입력<br>
            <span>•</span> <strong>이후 로그인</strong>: 아이디 + 비밀번호만으로 로그인 가능<br>
            <span>•</span> 라이선스가 등록되면 코드 없이 접속됩니다
          </div>
        </div>
        
        <label class="checkbox-group">
          <input type="checkbox" class="checkbox-input" id="autoLogin" checked>
          <span class="checkbox-custom"></span>
          <span class="checkbox-label">자동 로그인 유지</span>
        </label>
        
        <button type="submit" class="login-btn" id="loginButton">
          <span class="btn-content">
            <span>로그인</span>
          </span>
        </button>
      </form>
      
      <!-- 푸터 -->
      <div class="footer-info">
        <p class="footer-text">
          <span class="highlight">🔐 인증 정보는 로컬에 안전하게 저장됩니다</span><br>
          앱 업데이트 후에도 인증 상태가 유지됩니다
        </p>
      </div>
    </div>
  </div>
  
  <!-- 환영 모달 -->
  <div id="welcomeModal" class="welcome-modal">
    <div class="welcome-content">
      <div id="welcomeIcon" class="welcome-icon">🔐</div>
      <h2 id="welcomeTitle" class="welcome-title">인증 중...</h2>
      <p id="welcomeMessage" class="welcome-message">서버에 연결하여 라이선스를 확인하고 있습니다.<br>잠시만 기다려주세요...</p>
      <div id="welcomeLoader" class="welcome-loader"></div>
      <div id="welcomeCheckmark" class="welcome-checkmark"></div>
    </div>
  </div>
  
  <script>
    // contextBridge를 통해 노출된 API 사용
    const ipcApi = window.electronAPI || window.electron || window.blogger;

    async function startFreeTrial() {
      const btn = document.getElementById('freeTrialBtn');
      if (btn) {
        btn.disabled = true;
        btn.innerHTML = '⏳ 무료체험 접속 중...';
      }

      try {
        // Send free trial signal to main process
        if (ipcApi && ipcApi.invoke) {
          await ipcApi.invoke('auth:free-trial');
        } else if (ipcApi && ipcApi.send) {
          ipcApi.send('auth:free-trial');
        }
      } catch (e) {
        console.error('Free trial error:', e);
        if (btn) {
          btn.disabled = false;
          btn.innerHTML = '🆓 매일 2회 무료체험하기';
        }
      }
    }
    
    // DOM 요소
    const form = document.getElementById('loginForm');
    const userIdInput = document.getElementById('userId');
    const passwordInput = document.getElementById('password');
    const licenseCodeInput = document.getElementById('licenseCode');
    const autoLoginCheckbox = document.getElementById('autoLogin');
    const loginButton = document.getElementById('loginButton');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    
    // 파티클 효과
    function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 5 + 's';
        particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
        container.appendChild(particle);
      }
    }
    createParticles();
    
    // 메시지 표시
    function showError(message) {
      errorMessage.querySelector('.message-text').textContent = message;
      errorMessage.classList.add('show');
      successMessage.classList.remove('show');
    }
    
    function showSuccess(message) {
      successMessage.querySelector('.message-text').textContent = message;
      successMessage.classList.add('show');
      errorMessage.classList.remove('show');
    }
    
    function hideMessages() {
      errorMessage.classList.remove('show');
      successMessage.classList.remove('show');
    }
    
    // 환영 모달
    function showWelcomeModal() {
      const modal = document.getElementById('welcomeModal');
      const icon = document.getElementById('welcomeIcon');
      const title = document.getElementById('welcomeTitle');
      const message = document.getElementById('welcomeMessage');
      const loader = document.getElementById('welcomeLoader');
      const checkmark = document.getElementById('welcomeCheckmark');
      
      icon.textContent = '🔐';
      title.textContent = '인증 중...';
      message.innerHTML = '서버에 연결하여 라이선스를 확인하고 있습니다.<br>잠시만 기다려주세요...';
      loader.style.display = 'block';
      checkmark.style.display = 'none';
      modal.classList.add('show');
    }
    
    function showWelcomeSuccess(userId, resultMessage) {
      const icon = document.getElementById('welcomeIcon');
      const title = document.getElementById('welcomeTitle');
      const message = document.getElementById('welcomeMessage');
      const loader = document.getElementById('welcomeLoader');
      const checkmark = document.getElementById('welcomeCheckmark');
      const modal = document.getElementById('welcomeModal');
      
      icon.textContent = '🎉';
      title.textContent = '환영합니다!';
      title.style.background = 'linear-gradient(135deg, #22c55e, #16a34a)';
      title.style.webkitBackgroundClip = 'text';
      title.style.webkitTextFillColor = 'transparent';
      
      message.innerHTML = `
        <strong style="color: #fff; font-size: 18px;">${userId}</strong>님,<br>
        라이선스 인증이 완료되었습니다!<br><br>
        <span style="color: #22c55e;">${resultMessage || '정상적으로 인증되었습니다.'}</span><br><br>
        <span style="font-size: 13px; opacity: 0.6;">화면을 클릭하거나 10초 후 자동으로 앱이 시작됩니다</span>
      `;
      
      loader.style.display = 'none';
      checkmark.style.display = 'flex';
      
      modal.style.cursor = 'pointer';
      modal.onclick = () => {
        if (ipcApi) ipcApi.invoke('login-success-signal');
      };
    }
    
    function hideWelcomeModal() {
      const modal = document.getElementById('welcomeModal');
      modal.classList.remove('show');
      modal.onclick = null;
      modal.style.cursor = 'default';
    }
    
    // 자동 로그인 체크
    async function checkAutoLoginOnLoad() {
      if (!ipcApi) return false;
      
      try {
        const status = await ipcApi.invoke('license-status-new');
        
        if (status && status.valid === true) {
          if (status.type === 'temporary' && status.expiresAt) {
            const expiresDate = new Date(status.expiresAt);
            if (expiresDate <= new Date()) {
              showError('라이선스가 만료되었습니다. 코드를 다시 등록해주세요.');
              return false;
            }
          }
          
          showSuccess('자동 로그인 성공!');
          setTimeout(() => {
            ipcApi.invoke('login-success-signal');
          }, 500);
          return true;
        }
      } catch (error) {
        console.error('자동 로그인 확인 실패:', error);
      }
      
      return false;
    }
    
    // 앱 시작 시
    window.addEventListener('DOMContentLoaded', async () => {
      if (!ipcApi) {
        showError('앱 초기화 오류가 발생했습니다. 앱을 다시 시작해주세요.');
        return;
      }
      
      try {
        const config = await ipcApi.invoke('load-auto-login-config');
        
        if (config && config.enabled) {
          const autoLoginSuccess = await checkAutoLoginOnLoad();
          if (autoLoginSuccess) return;
        }
        
        if (config && config.userId) {
          userIdInput.value = config.userId;
        }
      } catch (error) {
        console.error('자동 로그인 확인 실패:', error);
      }
    });
    
    // 폼 제출
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();
      
      if (!ipcApi) {
        showError('IPC를 사용할 수 없습니다.');
        return;
      }
      
      const userId = userIdInput.value.trim();
      const password = passwordInput.value;
      const licenseCode = licenseCodeInput.value.trim() || undefined;
      const autoLogin = autoLoginCheckbox.checked;
      
      if (!userId || !password) {
        showError('아이디와 비밀번호를 입력해주세요.');
        return;
      }
      
      // 버튼 비활성화
      loginButton.disabled = true;
      loginButton.innerHTML = '<span class="btn-content"><div class="spinner"></div><span>인증 중...</span></span>';
      
      showWelcomeModal();
      
      try {
        const startTime = Date.now();
        
        const result = await ipcApi.invoke('license-authenticate', {
          userId,
          password,
          licenseCode
        });
        
        // 최소 2초 대기
        const elapsed = Date.now() - startTime;
        if (elapsed < 2000) {
          await new Promise(resolve => setTimeout(resolve, 2000 - elapsed));
        }
        
        if (result.success) {
          if (autoLogin) {
            await ipcApi.invoke('save-auto-login-config', true, userId);
          } else {
            await ipcApi.invoke('save-auto-login-config', false);
          }
          
          // 중복 로그인 방지: 다른 기기 세션 종료 알림
          let welcomeMsg = result.message;
          if (result.previousSessionTerminated) {
            welcomeMsg = '⚠️ 다른 기기에서 로그인되어 있던 세션이 종료되었습니다.\n' + welcomeMsg;
          }
          
          // 주기적 세션 검증 시작
          await ipcApi.invoke('session-start-validation');
          
          showWelcomeSuccess(userId, welcomeMsg);
          
          setTimeout(() => {
            ipcApi.invoke('login-success-signal');
          }, 10000);
        } else {
          hideWelcomeModal();
          showError(result.message || '인증 실패');
          loginButton.disabled = false;
          loginButton.innerHTML = '<span class="btn-content"><span>로그인</span></span>';
        }
      } catch (error) {
        hideWelcomeModal();
        showError(`인증 중 오류가 발생했습니다: ${error.message || '알 수 없는 오류'}`);
        loginButton.disabled = false;
        loginButton.innerHTML = '<span class="btn-content"><span>로그인</span></span>';
      }
    });
    
    // Enter 키로 로그인
    [userIdInput, passwordInput, licenseCodeInput].forEach(input => {
      input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          form.dispatchEvent(new Event('submit'));
        }
      });
    });
  </script>
</body>
</html>
