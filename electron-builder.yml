appId: com.leadernam.orbit
productName: LEADERNAM Orbit
copyright: Copyright © 2025 Leadernam

directories:
  buildResources: build
  output: release

files:
  - dist/**/*
  - electron/**/*
  - package.json
  - node_modules/**/*
  - "!node_modules/**/*.{md,ts,map}"

# Windows 빌드 설정
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  # 🔥 공백 없는 파일명 (GitHub 업로드 시 공백이 점으로 변환되어 latest.yml과 불일치 방지)
  artifactName: LEADERNAM-Orbit-${version}.${ext}
  # publisherName 제거: 코드 서명이 없어 electron-updater 검증 실패 → 자동 업데이트 거부되는 문제 해결
  # 파일 무결성은 latest.yml의 SHA-512 해시로 여전히 검증됨

# macOS 빌드 설정
mac:
  target:
    - target: default
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
  icon: build/icon.icns
  artifactName: LEADERNAM-Orbit-${version}-${arch}.${ext}
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # 코드 서명이 필요한 경우 아래 주석 해제
  # identity: "Developer ID Application: Your Name (TEAM_ID)"

# Linux 빌드 설정
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Utility
  icon: build/icon.png
  artifactName: LEADERNAM-Orbit-${version}-${arch}.${ext}

# NSIS 인스톨러 설정 (Windows) — 참고: Better Life Naver 구조
nsis:
  oneClick: false
  perMachine: false  # 🔥 사용자 폴더에 설치 (UAC 권한 불필요, 자동 업데이트 정상 작동)
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ${productName}
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  menuCategory: true

# GitHub 자동 업데이트 배포
publish:
  provider: github
  owner: cd000242-sudo
  repo: blogger-gpt-cli
  releaseType: release

# 압축 설정
compression: maximum

# 추가 설정
extraMetadata:
  main: electron/main.js








